    <text x="305" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0d1117">botui</text>
    <text x="305" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1a1a2e">Web UI · HTMX</text>
  </g>

