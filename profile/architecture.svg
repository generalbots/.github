  <g filter="url(#shadow)">
    <rect x="60" y="470" width="150" height="70" rx="8" fill="url(#uiGrad)"/>
    <text x="135" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0d1117">botapp</text>
    <text x="135" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1a1a2e">Tauri Desktop</text>
  </g>

