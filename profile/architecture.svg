<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#1958c7"/>
    </linearGradient>
    <linearGradient id="channelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#1a7f37"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a371f7"/>
      <stop offset="100%" style="stop-color:#8957e5"/>
    </linearGradient>
    <linearGradient id="bizGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f78166"/>
      <stop offset="100%" style="stop-color:#da6d53"/>
    </linearGradient>
    <linearGradient id="prodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#79c0ff"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ee787"/>
      <stop offset="100%" style="stop-color:#56d364"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d2a8ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0883e"/>
      <stop offset="100%" style="stop-color:#db6d28"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">General Bots Architecture</text>
  <text x="550" y="66" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e">Cargo Workspace — 57 Crates</text>

  <!-- Core Layer (9 crates) -->
  <g filter="url(#shadow)">
    <rect x="30" y="90" width="240" height="28" rx="6" fill="url(#coreGrad)"/>
    <text x="150" y="109" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">CORE (9 crates)</text>
  </g>
  <g font-family="monospace" font-size="10" fill="#a5d6ff">
    <text x="40" y="135">botserver</text>
    <text x="130" y="135">botlib</text>
    <text x="195" y="135">botllm</text>
    <text x="40" y="150">botcorebot</text>
    <text x="130" y="150">botcorepkg</text>
    <text x="40" y="165">botcoresession</text>
    <text x="150" y="165">botcoreoauth</text>
    <text x="40" y="180">botcoresecrets</text>
    <text x="150" y="180">botcoredirectory</text>
  </g>

  <!-- Channels Layer (6 crates) -->
  <g filter="url(#shadow)">
    <rect x="290" y="90" width="240" height="28" rx="6" fill="url(#channelGrad)"/>
    <text x="410" y="109" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">CHANNELS (6 crates)</text>
  </g>
  <g font-family="monospace" font-size="10" fill="#7ee787">
    <text x="300" y="135">botchannels</text>
    <text x="395" y="135">botwhatsapp</text>
    <text x="300" y="150">botmsteams</text>
    <text x="390" y="150">bottelegram</text>
    <text x="300" y="165">botinstagram</text>
    <text x="395" y="165">botemail</text>
  </g>

  <!-- AI & Search Layer (6 crates) -->
  <g filter="url(#shadow)">
    <rect x="550" y="90" width="240" height="28" rx="6" fill="url(#aiGrad)"/>
    <text x="670" y="109" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">AI &amp; SEARCH (6 crates)</text>
  </g>
  <g font-family="monospace" font-size="10" fill="#d2a8ff">
    <text x="560" y="135">botqdrant</text>
    <text x="640" y="135">botsearch</text>
    <text x="720" y="135">botresearch</text>
    <text x="560" y="150">botmultimodal</text>
    <text x="660" y="150">botkb</text>
    <text x="720" y="150">botnvidia</text>
  </g>

  <!-- Business Applications Layer (10 crates) -->
  <g filter="url(#shadow)">
