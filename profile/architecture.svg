    <text x="180" y="229" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">BUSINESS APPLICATIONS (10 crates)</text>
  </g>
  <g font-family="monospace" font-size="10" fill="#ffddd2">
    <text x="40" y="255">botattendance</text>
    <text x="140" y="255">botbilling</text>
    <text x="220" y="255">botcalendar</text>
    <text x="40" y="270">botcompliance</text>
    <text x="150" y="270">botcontacts</text>
    <text x="240" y="270">botproducts</text>
    <text x="40" y="285">botproject</text>
    <text x="130" y="285">bottasks</text>
    <text x="200" y="285">bottickets</text>
    <text x="275" y="285">botmarketing</text>
  </g>

  <!-- Productivity & Content Layer (10 crates) -->
  <g filter="url(#shadow)">
    <rect x="350" y="210" width="300" height="28" rx="6" fill="url(#prodGrad)"/>
    <text x="500" y="229" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0d1117">PRODUCTIVITY &amp; CONTENT (10 crates)</text>
  </g>
  <g font-family="monospace" font-size="10" fill="#cae8ff">
    <text x="360" y="255">botaiassist</text>
    <text x="445" y="255">botknowledge</text>
    <text x="555" y="255">botcontent</text>
    <text x="360" y="270">botcollab</text>
    <text x="440" y="270">botforms</text>
    <text x="510" y="270">botworkflow</text>
    <text x="360" y="285">botscheduler</text>
    <text x="460" y="285">botfeed</text>
    <text x="530" y="285">botmedia</text>
    <text x="600" y="285">botdoc</text>
  </g>

