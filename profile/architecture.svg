    <rect x="400" y="700" width="180" height="60" rx="8" fill="url(#aiGrad)"/>
    <text x="490" y="725" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">AI &amp; Search</text>
    <text x="490" y="745" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d2a8ff">Qdrant · Research · LLM</text>
  </g>

  <!-- Infrastructure -->
  <g filter="url(#shadow)">
    <rect x="620" y="700" width="180" height="60" rx="8" fill="url(#infraGrad)"/>
    <text x="710" y="725" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#0d1117">Infrastructure</text>
    <text x="710" y="745" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1a4721">Store · Cache · Queue · Net</text>
  </g>

  <!-- External Services -->
  <g>
    <rect x="860" y="470" width="100" height="130" rx="8" fill="none" stroke="#30363d" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="910" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">External</text>
    <text x="910" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6e7681">OpenAI</text>
    <text x="910" y="536" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6e7681">Anthropic</text>
    <text x="910" y="552" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6e7681">Groq</text>
    <text x="910" y="568" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6e7681">Ollama</text>
    <text x="910" y="584" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6e7681">Qdrant</text>
  </g>
  <path d="M 660 625 L 850 540" stroke="#30363d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <g transform="translate(870, 700)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#8b949e">LEGEND</text>
    <rect x="0" y="12" width="14" height="10" rx="2" fill="url(#coreGrad)"/>
    <text x="20" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8b949e">Core</text>
    <rect x="0" y="28" width="14" height="10" rx="2" fill="url(#channelGrad)"/>
    <text x="20" y="37" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8b949e">Channels</text>
    <rect x="0" y="44" width="14" height="10" rx="2" fill="url(#aiGrad)"/>
    <text x="20" y="53" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8b949e">AI &amp; Search</text>
    <rect x="0" y="60" width="14" height="10" rx="2" fill="url(#bizGrad)"/>
    <text x="20" y="69" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8b949e">Business</text>
    <rect x="0" y="76" width="14" height="10" rx="2" fill="url(#infraGrad)"/>
    <text x="20" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8b949e">Infrastructure</text>
    <rect x="0" y="92" width="14" height="10" rx="2" fill="url(#uiGrad)"/>
    <text x="20" y="101" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8b949e">UI</text>
  </g>

  <!-- Footer -->
  <text x="550" y="800" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#484f58">cargo build —workspace · Code Name: Guaribas · AGPL-3.0</text>
</svg>