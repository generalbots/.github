    <text x="495" y="518" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#d1fae5">WhatsApp · Teams · Telegram</text>
    <text x="495" y="532" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#d1fae5">Instagram · Email</text>
  </g>

  <!-- Arrows to botserver -->
  <path d="M 305 540 L 305 560 L 550 560 L 550 580" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 135 540 L 135 570 L 550 570 L 550 580" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
  <path d="M 495 540 L 495 560 L 550 560" stroke="#7ee787" stroke-width="2" fill="none"/>

  <!-- botserver central -->
  <g filter="url(#shadow)">
    <rect x="440" y="590" width="220" height="70" rx="10" fill="url(#coreGrad)"/>
    <text x="550" y="620" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">botserver</text>
    <text x="550" y="642" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a5d6ff">Core API · LLM Orchestration · Routing</text>
  </g>

  <!-- Arrows from botserver down -->
  <path d="M 490 660 L 300 690" stroke="#f78166" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 550 660 L 550 690" stroke="#a371f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 610 660 L 800 690" stroke="#7ee787" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- botlib -->
  <g filter="url(#shadow)">
    <rect x="180" y="700" width="180" height="60" rx="8" fill="url(#bizGrad)"/>
    <text x="270" y="725" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">botlib</text>
    <text x="270" y="745" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffddd2">Types · Utils · HTTP</text>
  </g>

