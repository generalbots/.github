  <g filter="url(#shadow)">
    <rect x="30" y="320" width="500" height="28" rx="6" fill="url(#infraGrad)"/>
    <text x="280" y="339" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0d1117">INFRASTRUCTURE (14 crates)</text>
  </g>
  <g font-family="monospace" font-size="10" fill="#1a4721">
    <text x="40" y="365">botstore</text>
    <text x="110" y="365">botcache</text>
    <text x="180" y="365">botqueue</text>
    <text x="250" y="365">botnet</text>
    <text x="310" y="365">botconfig</text>
    <text x="390" y="365">botlog</text>
    <text x="440" y="365">botmetrics</text>
    <text x="40" y="380">bothttprouter</text>
    <text x="145" y="380">botmiddleware</text>
    <text x="255" y="380">botstaticfiles</text>
    <text x="370" y="380">botdeployment</text>
    <text x="40" y="395">botpackage</text>
    <text x="130" y="395">botdaemon</text>
    <text x="210" y="395">botwatcher</text>
